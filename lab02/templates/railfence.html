<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rail Fence Cipher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <script>
        function onlyNumber(event) {
            const char = String.fromCharCode(event.which);
            if (!/[0-9]/.test(char)) {
                event.preventDefault();
            }
        }
    </script>
</head>

<body>

<div class="container mt-5">

<table class="table">

    <!-- TITLE -->
    <tr>
        <td style="text-align:center; font-weight:bold; font-size:25px;">
            RAIL FENCE CIPHER
        </td>
    </tr>


    <!-- ENCRYPTION -->
    <tr>
        <td style="font-weight:bold; color:blue">
            ENCRYPTION
        </td>
    </tr>

    <tr>
        <td>

            <form method="POST" action="/railfence/encrypt">

                <div class="mb-3">
                    <label>Plain text</label>
                    <input
                        type="text"
                        class="form-control"
                        name="inputPlainText"
                        placeholder="Input Plain Text"
                        required
                        autofocus>
                </div>

                <div class="mb-3">
                    <label>Key (Số)</label>
                    <input
                        type="number"
                        class="form-control"
                        name="inputKeyPlain"
                        placeholder="Ví dụ: 3"
                        min="2"
                        onkeypress="onlyNumber(event)"
                        required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Encrypt
                </button>

                <div class="mb-3 mt-3">
                    <label>Result</label>
                    <input
                        type="text"
                        class="form-control"
                        value="{{outputCipher}}"
                        readonly>
                </div>

            </form>

        </td>
    </tr>


    <!-- DECRYPTION -->
    <tr>
        <td style="font-weight:bold; color:blue">
            DECRYPTION
        </td>
    </tr>

    <tr>
        <td>

            <form method="POST" action="/railfence/decrypt">

                <div class="mb-3">
                    <label>Cipher text</label>
                    <input
                        type="text"
                        class="form-control"
                        name="inputCipherText"
                        placeholder="Input Cipher Text"
                        required>
                </div>

                <div class="mb-3">
                    <label>Key (Số)</label>
                    <input
                        type="number"
                        class="form-control"
                        name="inputKeyCipher"
                        placeholder="Ví dụ: 3"
                        min="2"
                        onkeypress="onlyNumber(event)"
                        required>
                </div>

                <button type="submit" class="btn btn-success">
                    Decrypt
                </button>

                <div class="mb-3 mt-3">
                    <label>Result</label>
                    <input
                        type="text"
                        class="form-control"
                        value="{{outputPlain}}"
                        readonly>
                </div>

            </form>

        </td>
    </tr>




</table>

</div>

</body>
</html>
