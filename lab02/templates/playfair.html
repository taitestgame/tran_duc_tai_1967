<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Playfair Cipher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <script>
        function onlyLetters(event) {
            const char = String.fromCharCode(event.which);
            if (!/[a-zA-Z]/.test(char)) {
                event.preventDefault();
            }
        }
    </script>
</head>

<body>

<div class="container mt-5">

    <table class="table">

        <!-- TITLE -->
        <tr>
            <td style="text-align:center; font-weight:bold; font-size:25px;">
                PLAYFAIR CIPHER
            </td>
        </tr>

        <!-- ENCRYPTION -->
        <tr>
            <td style="font-weight:bold; color:blue">
                ENCRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/playfair/encrypt">

                    <div class="mb-3">
                        <label>Plain text:</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputPlainText"
                            placeholder="Input Plain Text"
                            required
                            autofocus
                            onkeypress="onlyLetters(event)">
                    </div>

                    <div class="mb-3">
                        <label>Key (Chuỗi chữ):</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputKeyPlain"
                            placeholder="Ví dụ: MONARCHY"
                            required
                            onkeypress="onlyLetters(event)">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Encrypt
                    </button>

                    <div class="mb-3 mt-3">
                        <label>Result:</label>
                        <input
                            type="text"
                            class="form-control"
                            value="{{outputCipher}}"
                            readonly>
                    </div>

                </form>

            </td>
        </tr>

        <!-- DECRYPTION -->
        <tr>
            <td style="font-weight:bold; color:blue">
                DECRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/playfair/decrypt">

                    <div class="mb-3">
                        <label>Cipher text:</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputCipherText"
                            placeholder="Input Cipher Text"
                            required
                            onkeypress="onlyLetters(event)">
                    </div>

                    <div class="mb-3">
                        <label>Key (Chuỗi chữ):</label>
                        <input
                            type="text"
                            class="form-control"
                            name="inputKeyCipher"
                            placeholder="Ví dụ: MONARCHY"
                            required
                            onkeypress="onlyLetters(event)">
                    </div>

                    <button type="submit" class="btn btn-success">
                        Decrypt
                    </button>

                    <div class="mb-3 mt-3">
                        <label>Result:</label>
                        <input
                            type="text"
                            class="form-control"
                            value="{{outputPlain}}"
                            readonly>
                    </div>

                </form>

            </td>
        </tr>



    </table>

</div>

</body>
</html>
