<!DOCTYPE html>
<html lang="en">

<head>
    <title>Caesar Cipher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container">

    <table class="table table-bordered">

        <tr>
            <td style="text-align:center; font-weight:bold; font-size:25px;">
                CAESAR CIPHER
            </td>
        </tr>

        <!-- ENCRYPTION -->

        <tr>
            <td style="font-weight:bold; color:blue;">
                ENCRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/encrypt">

                    <div class="form-group">
                        <label for="label">Plain text</label>

                        <input type="text"
                               class="form-control"
                               name="inputPlainText"
                               placeholder="Input Plain Text"
                               required
                               autofocus>
                    </div>


                    <div class="form-group">
                        <label for="label">Key</label>

                        <input type="number"
                               class="form-control"
                               name="inputKeyPlain"
                               placeholder="Input Key"
                               required>
                    </div>


                    <button type="submit" class="btn btn-primary">
                        Encrypt
                    </button>

                </form>

            </td>
        </tr>


        <!-- DECRYPTION -->

        <tr>
            <td style="font-weight:bold; color:blue;">
                DECRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/decrypt">

                    <div class="form-group">
                        <label class="form-label">Cipher text</label>

                        <input type="text"
                               class="form-control"
                               name="inputCipherText"
                               placeholder="Input Cipher Text"
                               required>
                    </div>


                    <div class="form-group">
                        <label class="form-label">Key</label>

                        <input type="number"
                               class="form-control"
                               name="inputKeyCipher"
                               placeholder="Input Key"
                               required>
                    </div>


                    <button type="submit" class="btn btn-success">
                        Decrypt
                    </button>

                </form>

            </td>
        </tr>

    </table>

</div>

</body>
</html>
